# Phase 1: RGB-only with Krivov et al. 2024 training strategies
# Target: ~78-80% accuracy

# Data
data_root: ../dataset
mode: rgb
# 32 frames with interval=2 (same as Krivov et al. 2024)
# Patched MViT forward computes thw dynamically
num_frames_rgb: 32
frame_interval: 2
rgb_size: 224
batch_size: 6
num_workers: 8

# Augmentations (Krivov pipeline)
video_aug: true
image_aug: true

# Model
rgb_backbone: mvit_v2_s
rgb_pretrained: true
rgb_freeze_stages: 0
drop_path_rate: 0.2
use_regression_head: true

# Training (Krivov recipe)
epochs: 60
lr: 0.0016
weight_decay: 0.05
max_grad_norm: 5.0
gradient_accumulation: 4
warmup_epochs: 5

# Augmentation params
mixup_alpha: 0.8
cutmix_alpha: 1.0
label_smoothing: 0.1

# Loss
huber_loss_weight: 5.0

# Classifier
classifier_dropout: 0.0

# AMP
bf16: true

# Logging
log_every: 100
save_every: 3

# Early stopping (counted only AFTER warmup)
patience: 12
min_delta: 0.003

# Output
output_dir: checkpoints/rgb_krivov
